services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-precognito_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-precognito_password}
      POSTGRES_DB: ${POSTGRES_DB:-precognito}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-adminpassword123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-precognito_org}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-precognito_bucket}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-precognito_super_secret_token_123}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy:latest
    command: serve --host 0.0.0.0 --port 80
    environment:
      NTFY_BASE_URL: http://localhost:8079
    ports:
      - "8079:80"
    volumes:
      - ntfy_data:/var/cache/ntfy
    restart: unless-stopped

  api:
    build:
      context: .
      target: backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-precognito_user}:${POSTGRES_PASSWORD:-precognito_password}@postgres:5432/${POSTGRES_DB:-precognito}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-precognito_super_secret_token_123}
      INFLUX_ORG: ${INFLUX_ORG:-precognito_org}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-precognito_bucket}
      MQTT_BROKER: mosquitto
      BETTER_AUTH_SECRET: fdr6WiAkIlESTZIjLMEAea2ni2PUZAUiTwVu046W5W8=
      BETTER_AUTH_URL: http://localhost:3000
      ENFORCE_HTTPS: "False"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - influxdb
      - mosquitto
    restart: always

  frontend:
    build:
      context: .
      target: frontend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-precognito_user}:${POSTGRES_PASSWORD:-precognito_password}@postgres:5432/${POSTGRES_DB:-precognito}
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BETTER_AUTH_SECRET: fdr6WiAkIlESTZIjLMEAea2ni2PUZAUiTwVu046W5W8=
      BETTER_AUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
