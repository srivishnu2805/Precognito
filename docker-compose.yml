version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: precognito_user
      POSTGRES_PASSWORD: precognito_password
      POSTGRES_DB: precognito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword123
      DOCKER_INFLUXDB_INIT_ORG: precognito_org
      DOCKER_INFLUXDB_INIT_BUCKET: precognito_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: precognito_super_secret_token_123
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    restart: unless-stopped

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config:
